<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CricLive — IPL 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090f;--bg2:#0d1117;--bg3:#111820;
  --card:#131b27;--card2:#182030;--card3:#1e2840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#00e5a0;--accent2:#00b8ff;--accent3:#ff6b35;
  --live:#ff3d5a;--yellow:#fbbf24;
  --text:#eef2ff;--text2:#7e8fa8;--text3:#3d4f6a;
  --green:#22c55e;--red:#ef4444;
  --font-d:'Bebas Neue',sans-serif;
  --font:'DM Sans',sans-serif;
  --font-m:'DM Mono',monospace;
  --r:14px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(0,229,160,0.05) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 80% 100%,rgba(0,184,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.hdr-inner{max-width:560px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-txt{font-family:var(--font-d);font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(255,61,90,0.12);border:1px solid rgba(255,61,90,0.28);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;color:var(--live);letter-spacing:1px}
.ldot{width:6px;height:6px;background:var(--live);border-radius:50%;animation:blink 1.3s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* MAIN */
.main{max-width:560px;margin:0 auto;padding:12px 12px 90px;position:relative;z-index:1}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.spinner{width:44px;height:44px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text2);font-size:13px;letter-spacing:1px;font-family:var(--font-m)}

/* MATCH CARDS */
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-family:var(--font-d);font-size:20px;letter-spacing:2px;color:var(--text)}
.count-badge{font-size:11px;color:var(--text3);font-family:var(--font-m);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.refresh-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.auto-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:blink 2s ease-in-out infinite}
.auto-txt{font-size:11px;color:var(--text3);font-family:var(--font-m)}
.matches-list{display:flex;flex-direction:column;gap:10px}

.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--text3);transition:background 0.2s}
.mcard.is-live::after{background:var(--live)}
.mcard.is-done::after{background:var(--accent)}
.mcard:hover,.mcard:active{background:var(--card2);border-color:rgba(0,229,160,0.2);transform:translateY(-1px)}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.series-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-family:var(--font-m)}
.status-pill{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px}
.sp-live{background:rgba(255,61,90,0.12);color:var(--live);border:1px solid rgba(255,61,90,0.25)}
.sp-done{background:rgba(0,229,160,0.08);color:var(--accent);border:1px solid rgba(0,229,160,0.18)}
.sp-up{background:rgba(126,143,168,0.1);color:var(--text2);border:1px solid var(--border)}
.mcard-teams{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;line-height:1.4}
.mcard-meta{font-size:12px;color:var(--text2)}
.mcard-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:20px;transition:all 0.2s}
.mcard:hover .mcard-arrow{color:var(--accent);right:12px}

/* SCORE VIEW */
#score-view{display:none}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;padding:7px 14px;border-radius:30px;cursor:pointer;margin-bottom:16px;transition:all 0.2s}
.back-btn:hover{border-color:rgba(0,229,160,0.3);color:var(--accent)}

/* LIVE SCORE HERO */
.score-hero{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:12px}
.hero-top{background:linear-gradient(135deg,rgba(0,229,160,0.07),rgba(0,184,255,0.04));border-bottom:1px solid var(--border);padding:14px 16px}
.hero-series{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-family:var(--font-m);margin-bottom:6px}
.hero-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4}
.hero-venue{font-size:12px;color:var(--text2);margin-top:3px}

.hero-scores{padding:16px}

/* TEAM SCORE ROW — like cricbuzz */
.team-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.team-row:last-of-type{border-bottom:none}
.team-logo{width:36px;height:36px;border-radius:50%;background:var(--card3);display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid var(--border2);flex-shrink:0}
.team-info{flex:1;min-width:0}
.team-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.3px}
.team-overs{font-size:12px;color:var(--text2);margin-top:1px}
.team-score-val{font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-m);flex-shrink:0;text-align:right}
.team-score-val.batting{color:var(--accent)}
.team-overs-right{font-size:11px;color:var(--text2);text-align:right;font-family:var(--font-m)}

.match-situation{margin-top:14px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);border-radius:10px;padding:10px 14px}
.situation-txt{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.rr-row{font-size:12px;color:var(--text2);font-family:var(--font-m)}
.rr-row span{color:var(--accent);font-weight:500}

/* LIVE BADGE HERO */
.hero-live-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero-live-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--live);letter-spacing:1px}
.last-upd{font-size:11px;color:var(--text3);font-family:var(--font-m)}

/* TABS */
.score-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.score-tabs::-webkit-scrollbar{display:none}
.stab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.stab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* BATTING TABLE */
.card-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.cs-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cs-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);font-family:var(--font-m)}
.cs-sub{font-size:11px;color:var(--text3);font-family:var(--font-m)}

/* Batting header */
.bat-head{display:grid;grid-template-columns:1fr 36px 36px 36px 36px 54px;gap:4px;padding:8px 14px;background:rgba(255,255,255,0.02)}
.bat-head span{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);text-align:right}
.bat-head span:first-child{text-align:left}

/* Batter row */
.bat-row{display:grid;grid-template-columns:1fr 36px 36px 36px 36px 54px;gap:4px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;transition:background 0.15s}
.bat-row:hover{background:rgba(255,255,255,0.02)}
.bat-row:last-child{border-bottom:none}
.bat-name{font-size:14px;font-weight:600;color:var(--text)}
.bat-name.batting{color:var(--accent)}
.bat-dism{font-size:11px;color:var(--text3);margin-top:2px}
.bat-num{font-size:14px;font-weight:600;color:var(--text);text-align:right;font-family:var(--font-m)}
.bat-num.runs{font-size:16px;color:var(--text)}
.bat-num.sr{font-size:12px;color:var(--text2)}
.bat-extras{padding:10px 14px;font-size:12px;color:var(--text2);background:rgba(255,255,255,0.02);border-top:1px solid var(--border)}

/* Bowling */
.bowl-head{display:grid;grid-template-columns:1fr 36px 36px 36px 36px 50px;gap:4px;padding:8px 14px;background:rgba(255,255,255,0.02)}
.bowl-head span{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);text-align:right}
.bowl-head span:first-child{text-align:left}
.bowl-row{display:grid;grid-template-columns:1fr 36px 36px 36px 36px 50px;gap:4px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center}
.bowl-row:last-child{border-bottom:none}
.bowl-name{font-size:14px;font-weight:600;color:var(--text)}
.bowl-num{font-size:14px;font-weight:600;color:var(--text);text-align:right;font-family:var(--font-m)}
.bowl-num.wkts{color:var(--live)}
.bowl-num.econ{font-size:12px;color:var(--text2)}

/* Partnership / FOW */
.info-row{padding:10px 14px;font-size:12px;color:var(--text2);border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px}
.info-row:last-child{border-bottom:none}
.info-lbl{color:var(--text3);font-weight:600;letter-spacing:0.5px;min-width:70px;flex-shrink:0}
.info-val{color:var(--text);flex:1}

/* Ball by ball */
.bbb-row{padding:12px 14px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none}
.bbb-row::-webkit-scrollbar{display:none}
.ball{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;border:1.5px solid transparent}
.ball-dot{background:rgba(255,255,255,0.06);color:var(--text3);border-color:var(--border)}
.ball-run{background:rgba(0,229,160,0.08);color:var(--accent);border-color:rgba(0,229,160,0.2)}
.ball-four{background:rgba(251,191,36,0.12);color:var(--yellow);border-color:rgba(251,191,36,0.3)}
.ball-six{background:rgba(0,184,255,0.12);color:var(--accent2);border-color:rgba(0,184,255,0.3)}
.ball-wkt{background:rgba(255,61,90,0.15);color:var(--live);border-color:rgba(255,61,90,0.35);font-size:11px}
.ball-wide{background:rgba(255,107,53,0.1);color:var(--accent3);border-color:rgba(255,107,53,0.25);font-size:10px}
.over-sep{font-size:11px;color:var(--text3);font-family:var(--font-m);flex-shrink:0;padding:0 4px}

/* Refresh */
.ref-strip{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0}
.ref-btn{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border2);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;padding:9px 20px;border-radius:30px;cursor:pointer;transition:all 0.2s}
.ref-btn:hover{border-color:rgba(0,229,160,0.35);color:var(--accent)}
.ref-btn svg{transition:transform 0.4s}
.ref-btn.spinning svg{animation:spin 0.8s linear infinite}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,9,15,0.96);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:100}
.bni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px;color:var(--text3);font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s}
.bni.active{color:var(--accent)}
.bni svg{width:21px;height:21px}

/* FADE IN */
.fi{animation:fi 0.35s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi-d{opacity:0;animation:fi 0.35s ease forwards}

/* ERROR */
.err-state{text-align:center;padding:60px 20px}
.err-icon{font-size:44px;margin-bottom:14px}
.err-msg{color:var(--text2);font-size:13px;margin-bottom:18px;line-height:1.5}
.retry-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#000;font-family:var(--font);font-weight:700;font-size:13px;padding:10px 26px;border-radius:30px;cursor:pointer;letter-spacing:0.5px}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-icon">🏏</div>
      <span class="logo-txt">CRICLIVE</span>
    </div>
    <div class="live-pill"><div class="ldot"></div>LIVE</div>
  </div>
</header>

<div class="main">

  <!-- MATCHES VIEW -->
  <div id="matches-view">
    <div class="refresh-row">
      <div class="auto-dot"></div>
      <span class="auto-txt">Live • auto-refreshes every 30s</span>
    </div>
    <div class="section-row">
      <div class="section-title">MATCHES</div>
      <div class="count-badge" id="mcnt">loading...</div>
    </div>
    <div id="mlist">
      <div class="loading"><div class="spinner"></div><p>FETCHING MATCHES...</p></div>
    </div>
  </div>

  <!-- SCORE VIEW -->
  <div id="score-view">
    <button class="back-btn" onclick="goBack()">← All Matches</button>
    <div id="score-content">
      <div class="loading"><div class="spinner"></div><p>LOADING SCORECARD...</p></div>
    </div>
  </div>

</div>

<div class="bnav">
  <div class="bni active" onclick="navTo(this,'scores')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20M2 12h20M12 2c-3 4-3 14 0 20M12 2c3 4 3 14 0 20"/></svg>
    Scores
  </div>
  <div class="bni" onclick="navTo(this,'search')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Search
  </div>
  <div class="bni" onclick="navTo(this,'ipl')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    IPL
  </div>
  <div class="bni" onclick="navTo(this,'settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    Settings
  </div>
</div>

<script>
const API = 'https://cricket-api-psi-six.vercel.app';
let curId = null, curTitle = null, refreshTimer = null, curTab = 'live';

// ── TEAM EMOJI MAP ──
const TEAM_EMOJI = {
  'RR':'🏆','MI':'💙','CSK':'💛','RCB':'❤️','KKR':'💜','DC':'🔵',
  'SRH':'🧡','LSG':'🟢','GT':'🔵','PBKS':'🔴','RWP':'🏏','MS':'🏏',
  'IND':'🇮🇳','AUS':'🇦🇺','ENG':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','PAK':'🇵🇰','SA':'🇿🇦',
  'NZ':'🇳🇿','WI':'🌴','SL':'🇱🇰','BAN':'🇧🇩','AFG':'🇦🇫',
};

function getEmoji(name){
  const n = (name||'').toUpperCase();
  for(const k of Object.keys(TEAM_EMOJI)){
    if(n.includes(k)) return TEAM_EMOJI[k];
  }
  return '🏏';
}

// ── SERIES LABEL ──
function getSeries(title){
  const t = (title||'').toLowerCase();
  if(t.includes('ipl')||t.includes('premier league')) return 'IPL 2026';
  if(t.includes('wpl')) return 'WPL 2026';
  if(t.includes('t20i')||t.includes('t20 inter')) return 'T20I';
  if(t.includes('odi')) return 'ODI';
  if(t.includes('test')) return 'TEST';
  return 'International';
}

// ── MATCH STATUS ──
function getStatus(title){
  const t=(title||'').toLowerCase();
  if(t.includes('won')||t.includes('result')||t.includes('no result')||t.includes('draw')) return 'done';
  if(t.includes('preview')) return 'upcoming';
  return 'live';
}

// ── FETCH ──
async function apiFetch(path){
  try{
    const r = await fetch(API+path,{cache:'no-store'});
    if(!r.ok) return null;
    return await r.json();
  }catch(e){return null;}
}

// ── LOAD MATCHES ──
async function loadMatches(){
  document.getElementById('mlist').innerHTML = '<div class="loading"><div class="spinner"></div><p>FETCHING MATCHES...</p></div>';
  const data = await apiFetch('/matches');
  if(!data||!data.matches){
    document.getElementById('mlist').innerHTML = `
      <div class="err-state">
        <div class="err-icon">📡</div>
        <div class="err-msg">Could not load matches.<br>Check internet connection.</div>
        <button class="retry-btn" onclick="loadMatches()">TRY AGAIN</button>
      </div>`;
    return;
  }
  renderMatches(data.matches);
}

// ── RENDER MATCHES ──
function renderMatches(matches){
  document.getElementById('mcnt').textContent = matches.length+' matches';
  if(!matches.length){
    document.getElementById('mlist').innerHTML = '<div class="err-state"><div class="err-icon">🏏</div><div class="err-msg">No matches found right now.</div></div>';
    return;
  }
  const el = document.createElement('div');
  el.className = 'matches-list fi';
  matches.forEach((m,i)=>{
    const st = getStatus(m.title);
    const series = getSeries(m.title);
    // Clean up title: "RRvsMI-Preview" → "RR vs MI"
    let teams = (m.title||'').split('-')[0].replace(/([a-z])([A-Z])/g,'$1 $2').replace('vs',' vs ').trim();
    const statusPill = st==='live'
      ? `<span class="status-pill sp-live"><span class="ldot" style="width:5px;height:5px"></span>LIVE</span>`
      : st==='done'
      ? `<span class="status-pill sp-done">RESULT</span>`
      : `<span class="status-pill sp-up">UPCOMING</span>`;
    const resultTxt = m.title.includes('-') ? m.title.split('-').slice(1).join(' ').trim() : '';
    const card = document.createElement('div');
    card.className = `mcard is-${st} fi-d`;
    card.style.animationDelay = (i*0.04)+'s';
    card.innerHTML = `
      <div class="mcard-top">
        <span class="series-lbl">${series}</span>
        ${statusPill}
      </div>
      <div class="mcard-teams">${teams}</div>
      ${resultTxt?`<div class="mcard-meta" style="margin-top:4px">${resultTxt}</div>`:''}
      <div class="mcard-arrow">›</div>`;
    card.onclick = ()=> openScore(m.id, teams);
    el.appendChild(card);
  });
  document.getElementById('mlist').innerHTML = '';
  document.getElementById('mlist').appendChild(el);
}

// ── OPEN SCORE ──
async function openScore(id, title){
  curId = id; curTitle = title;
  document.getElementById('matches-view').style.display = 'none';
  document.getElementById('score-view').style.display = 'block';
  document.getElementById('score-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>LOADING SCORECARD...</p></div>';
  const data = await apiFetch('/score?id='+id);
  if(!data||data.error){
    document.getElementById('score-content').innerHTML = `
      <div class="err-state">
        <div class="err-icon">⚠️</div>
        <div class="err-msg">Could not load scorecard.<br>Try refreshing.</div>
        <button class="retry-btn" onclick="openScore('${id}','${title}')">RETRY</button>
      </div>`;
    return;
  }
  renderScore(data, id, title);
  clearInterval(refreshTimer);
  refreshTimer = setInterval(()=>{ if(curId===id) silentRefresh(); }, 30000);
}

// ── SILENT REFRESH ──
async function silentRefresh(){
  if(!curId) return;
  const data = await apiFetch('/score?id='+curId);
  if(data && !data.error) renderScore(data, curId, curTitle);
}

// ── RENDER SCORE ──
function renderScore(data, id, title){
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const series = getSeries(data.title||title);
  const cleanTitle = (data.title||title)
    .replace(' - Commentary','')
    .replace(' - Live Cricket Score','')
    .replace(' - Cricket Score','');

  // Parse teams from title
  let team1='', team2='';
  const vsMatch = cleanTitle.match(/^(.+?)\s+vs\s+(.+?)(?:,|$)/i);
  if(vsMatch){ team1=vsMatch[1].trim(); team2=vsMatch[2].trim(); }

  // Parse scores from all_scores
  const allScores = (data.all_scores||[]).filter(s=>s&&s!=='N/A');
  const livescore = data.livescore && data.livescore!=='N/A' ? data.livescore : '';
  const runrate = data.runrate && data.runrate!=='N/A' ? data.runrate : '';
  const update = data.update && data.update!=='N/A' ? data.update : '';

  // Build team score rows
  let teamRowsHTML = '';
  if(allScores.length >= 2){
    allScores.slice(0,2).forEach((sc,i)=>{
      const tname = i===0 ? (team1||'Team 1') : (team2||'Team 2');
      const emoji = getEmoji(tname);
      // Extract overs from score like "150/3 (11)"
      const overMatch = sc.match(/\(([^)]+)\)/);
      const overs = overMatch ? overMatch[1]+' ov' : '';
      const scoreOnly = sc.replace(/\([^)]*\)/,'').trim();
      const isBatting = i===1; // second team is currently batting
      teamRowsHTML += `
        <div class="team-row">
          <div class="team-logo">${emoji}</div>
          <div class="team-info">
            <div class="team-name">${tname}</div>
            ${overs?`<div class="team-overs">${overs}</div>`:''}
          </div>
          <div>
            <div class="team-score-val${isBatting?' batting':''}">${scoreOnly}</div>
          </div>
        </div>`;
    });
  } else if(livescore){
    const tname = team1||'Batting';
    const emoji = getEmoji(tname);
    const overMatch = livescore.match(/\(([^)]+)\)/);
    const overs = overMatch ? overMatch[1]+' ov' : '';
    const scoreOnly = livescore.replace(/\([^)]*\)/,'').trim();
    teamRowsHTML = `
      <div class="team-row">
        <div class="team-logo">${emoji}</div>
        <div class="team-info">
          <div class="team-name">${tname}</div>
          ${overs?`<div class="team-overs">${overs}</div>`:''}
        </div>
        <div class="team-score-val batting">${scoreOnly}</div>
      </div>`;
  } else {
    teamRowsHTML = `<div style="padding:16px;color:var(--text3);font-size:13px;text-align:center">Score updating...</div>`;
  }

  // Batters
  let batHTML = '';
  if(data.batterone && data.batterone!=='N/A'){
    batHTML += `
      <div class="bat-row">
        <div><div class="bat-name batting">${data.batterone} *</div></div>
        <div class="bat-num runs">${data.batsmanonerun||'-'}</div>
        <div class="bat-num">${data.batsmanoneball||'-'}</div>
        <div class="bat-num">-</div><div class="bat-num">-</div>
        <div class="bat-num sr">${data.batsmanonesr||'-'}</div>
      </div>`;
  }
  if(data.battertwo && data.battertwo!=='N/A'){
    batHTML += `
      <div class="bat-row">
        <div><div class="bat-name">${data.battertwo}</div></div>
        <div class="bat-num runs">${data.batsmantworun||'-'}</div>
        <div class="bat-num">${data.batsmantwoball||'-'}</div>
        <div class="bat-num">-</div><div class="bat-num">-</div>
        <div class="bat-num sr">${data.batsmantwosr||'-'}</div>
      </div>`;
  }

  // Bowlers
  let bowlHTML = '';
  if(data.bowlerone && data.bowlerone!=='N/A'){
    bowlHTML += `
      <div class="bowl-row">
        <div class="bowl-name">${data.bowlerone}</div>
        <div class="bowl-num">${data.bowleroneover||'-'}</div>
        <div class="bowl-num">-</div>
        <div class="bowl-num">${data.bowleronerun||'-'}</div>
        <div class="bowl-num wkts">${data.bowleronewickers||'-'}</div>
        <div class="bowl-num econ">${data.bowleroneeconomy||'-'}</div>
      </div>`;
  }
  if(data.bowlertwo && data.bowlertwo!=='N/A'){
    bowlHTML += `
      <div class="bowl-row">
        <div class="bowl-name">${data.bowlertwo}</div>
        <div class="bowl-num">${data.bowlertwoover||'-'}</div>
        <div class="bowl-num">-</div>
        <div class="bowl-num">${data.bowlertworun||'-'}</div>
        <div class="bowl-num wkts">${data.bowlertwowickets||'-'}</div>
        <div class="bowl-num econ">${data.bowlertwoeconomy||'-'}</div>
      </div>`;
  }

  // Extract RRR info from runrate
  const crrMatch = (runrate||update||'').match(/CRR\s*[:\s]\s*([\d.]+)/i);
  const rrrMatch = (runrate||update||'').match(/RRR\s*[:\s]\s*([\d.]+)/i);
  const crrVal = crrMatch ? crrMatch[1] : null;
  const rrrVal = rrrMatch ? rrrMatch[1] : null;

  document.getElementById('score-content').innerHTML = `
  <div class="fi">

    <!-- HERO -->
    <div class="score-hero">
      <div class="hero-top">
        <div class="hero-series">${series}</div>
        <div class="hero-title">${cleanTitle}</div>
      </div>
      <div class="hero-scores">
        <div class="hero-live-row">
          <div class="hero-live-badge"><div class="ldot"></div>LIVE</div>
          <div class="last-upd">Updated ${now}</div>
        </div>
        ${teamRowsHTML}
        ${(update||crrVal||rrrVal) ? `
        <div class="match-situation">
          ${update ? `<div class="situation-txt">${update}</div>` : ''}
          ${(crrVal||rrrVal) ? `<div class="rr-row">
            ${crrVal ? `CRR: <span>${crrVal}</span>` : ''}
            ${crrVal&&rrrVal ? ' &nbsp;•&nbsp; ' : ''}
            ${rrrVal ? `RRR: <span>${rrrVal}</span>` : ''}
          </div>` : ''}
        </div>` : ''}
      </div>
    </div>

    <!-- TABS -->
    <div class="score-tabs">
      <div class="stab active" onclick="switchTab(this,'live')">Live</div>
      <div class="stab" onclick="switchTab(this,'batting')">Batting</div>
      <div class="stab" onclick="switchTab(this,'bowling')">Bowling</div>
      <div class="stab" onclick="switchTab(this,'info')">Info</div>
    </div>

    <!-- LIVE TAB -->
    <div id="tab-live">
      ${batHTML ? `
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">BATTERS</span><span class="cs-sub">At the crease</span></div>
        <div class="bat-head"><span>BATTER</span><span>R</span><span>B</span><span>4s</span><span>6s</span><span>SR</span></div>
        ${batHTML}
      </div>` : ''}

      ${bowlHTML ? `
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">BOWLERS</span><span class="cs-sub">Current</span></div>
        <div class="bowl-head"><span>BOWLER</span><span>O</span><span>M</span><span>R</span><span>W</span><span>ECO</span></div>
        ${bowlHTML}
      </div>` : ''}

      ${allScores.length ? `
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">ALL SCORES</span></div>
        <div style="padding:12px 14px;display:flex;flex-wrap:wrap;gap:8px">
          ${allScores.map(s=>`<span style="background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.18);border-radius:8px;padding:6px 12px;font-family:var(--font-m);font-size:13px;color:var(--accent)">${s}</span>`).join('')}
        </div>
      </div>` : ''}
    </div>

    <!-- BATTING TAB (hidden) -->
    <div id="tab-batting" style="display:none">
      ${batHTML ? `
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">BATTING</span></div>
        <div class="bat-head"><span>BATTER</span><span>R</span><span>B</span><span>4s</span><span>6s</span><span>SR</span></div>
        ${batHTML}
        <div class="bat-extras">Extras: — &nbsp;|&nbsp; Total: ${allScores[1]||allScores[0]||'—'}</div>
      </div>` : `<div class="err-state"><div class="err-icon">📊</div><div class="err-msg">Batting data not available.<br>Refresh to update.</div></div>`}
    </div>

    <!-- BOWLING TAB (hidden) -->
    <div id="tab-bowling" style="display:none">
      ${bowlHTML ? `
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">BOWLING</span></div>
        <div class="bowl-head"><span>BOWLER</span><span>O</span><span>M</span><span>R</span><span>W</span><span>ECO</span></div>
        ${bowlHTML}
      </div>` : `<div class="err-state"><div class="err-icon">🎯</div><div class="err-msg">Bowling data not available.<br>Refresh to update.</div></div>`}
    </div>

    <!-- INFO TAB (hidden) -->
    <div id="tab-info" style="display:none">
      <div class="card-section">
        <div class="cs-header"><span class="cs-title">MATCH INFO</span></div>
        <div class="info-row"><span class="info-lbl">Series</span><span class="info-val">${series}</span></div>
        <div class="info-row"><span class="info-lbl">Match ID</span><span class="info-val" style="font-family:var(--font-m)">${id}</span></div>
        <div class="info-row"><span class="info-lbl">Status</span><span class="info-val">${update||'Live'}</span></div>
        ${crrVal?`<div class="info-row"><span class="info-lbl">CRR</span><span class="info-val">${crrVal}</span></div>`:''}
        ${rrrVal?`<div class="info-row"><span class="info-lbl">RRR</span><span class="info-val">${rrrVal}</span></div>`:''}
        <div class="info-row"><span class="info-lbl">Source</span><span class="info-val">Cricbuzz</span></div>
      </div>
    </div>

    <!-- REFRESH -->
    <div class="ref-strip">
      <button class="ref-btn" id="ref-btn" onclick="doRefresh()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh Score
      </button>
    </div>

  </div>`;
}

// ── SWITCH TAB ──
function switchTab(el, name){
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['live','batting','bowling','info'].forEach(t=>{
    const el2 = document.getElementById('tab-'+t);
    if(el2) el2.style.display = t===name ? 'block' : 'none';
  });
}

// ── REFRESH ──
async function doRefresh(){
  if(!curId) return;
  const btn = document.getElementById('ref-btn');
  if(btn) btn.classList.add('spinning');
  const data = await apiFetch('/score?id='+curId);
  if(data&&!data.error) renderScore(data, curId, curTitle);
  if(btn) btn.classList.remove('spinning');
}

// ── GO BACK ──
function goBack(){
  clearInterval(refreshTimer);
  curId = null;
  document.getElementById('score-view').style.display = 'none';
  document.getElementById('matches-view').style.display = 'block';
}

// ── BOTTOM NAV ──
function navTo(el, sec){
  document.querySelectorAll('.bni').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(sec==='search'){
    const id = prompt('Enter Match ID:');
    if(id&&id.trim()) openScore(id.trim(),'Match #'+id);
  } else if(sec==='scores'){
    goBack();
  }
}

// ── AUTO REFRESH MATCHES ──
setInterval(()=>{ if(!curId) loadMatches(); }, 30000);

// ── INIT ──
loadMatches();
</script>
</body>
</html>
